services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vpn_bot
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: vpn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn -d vpn_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m app.main"
    restart: unless-stopped

volumes:
  postgres_data:
